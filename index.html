<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Architecture Planner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(30, 30, 30, 0.85);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            max-width: 250px;
        }
        h3 { margin-top: 0; color: #4fa8ff; }
        button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #4fa8ff;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #2f89e0; }
        .instruction {
            font-size: 12px;
            color: #aaa;
            margin-top: 15px;
            line-height: 1.4;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-panel">
        <h3>Architect 3D v1.0</h3>
        <p>Tambah Elemen:</p>
        <button onclick="addWall()">+ Tambah Dinding</button>
        <button onclick="addRoom()">+ Tambah Ruangan Kubus</button>
        <button onclick="addPlane()">✈ Tambah Pesawat</button>
        <button onclick="clearScene()" style="background: #ff4f4f;">Hapus Semua</button>

        <div class="instruction">
            <strong>Navigasi:</strong><br>
            • Klik kiri + Geser: Putar Kamera<br>
            • Klik kanan + Geser: Geser Kamera<br>
            • Scroll: Zoom In/Out
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // 1. Setup Scene, Kamera, dan Renderer
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e1e1e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 15, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // 2. Kontrol Kamera (OrbitControls)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.01;

        // 3. Pencahayaan (Lighting)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 4. Lantai Grid
        const gridHelper = new THREE.GridHelper(30, 30, 0x4fa8ff, 0x444444);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        const floorGeometry = new THREE.PlaneGeometry(30, 30);
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x2e2e2e, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Array untuk menyimpan objek arsitektur yang dibuat
        let objects = [];

        // 5. Fungsi untuk Menambah Objek
        function addWall() {
            const geometry = new THREE.BoxGeometry(5, 2.5, 0.2);
            const material = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.5 });
            const wall = new THREE.Mesh(geometry, material);
            wall.position.set((Math.random() - 0.5) * 5, 1.25, (Math.random() - 0.5) * 5);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
            objects.push(wall);
        }

        function addRoom() {
            const geometry = new THREE.BoxGeometry(4, 3, 4);
            const material = new THREE.MeshStandardMaterial({
                color: 0x4fa8ff,
                wireframe: true,
                linewidth: 2
            });
            const room = new THREE.Mesh(geometry, material);
            room.position.set((Math.random() - 0.5) * 5, 1.5, (Math.random() - 0.5) * 5);
            scene.add(room);
            objects.push(room);
        }

        function clearScene() {
            objects.forEach(obj => scene.remove(obj));
            objects = [];
        }

        // Fungsi membuat model pesawat komersial yang lebih detail
        function addPlane() {
            const group = new THREE.Group();

            // ── Material ──────────────────────────────────────────────
            const fuselageMat  = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.3, metalness: 0.5 });
            const wingMat      = new THREE.MeshStandardMaterial({ color: 0xdce3ee, roughness: 0.3, metalness: 0.5 });
            const engineMat    = new THREE.MeshStandardMaterial({ color: 0x555566, roughness: 0.4, metalness: 0.7 });
            const engineRimMat = new THREE.MeshStandardMaterial({ color: 0x888899, roughness: 0.3, metalness: 0.8 });
            const glassMat     = new THREE.MeshStandardMaterial({ color: 0x99ccff, roughness: 0.05, metalness: 0.1, transparent: true, opacity: 0.55 });
            const accentMat    = new THREE.MeshStandardMaterial({ color: 0x2255cc, roughness: 0.4, metalness: 0.3 });
            const noseMat      = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.5, metalness: 0.3 });
            const tireMat      = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9, metalness: 0.0 });
            const gearMat      = new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.4, metalness: 0.8 });

            // ── Fuselage — LatheGeometry untuk bentuk aerodinamis ────
            const profilePts = [
                new THREE.Vector2(0,    0.01),
                new THREE.Vector2(0.15, 0.18),
                new THREE.Vector2(0.5,  0.36),
                new THREE.Vector2(1.0,  0.44),
                new THREE.Vector2(2.0,  0.48),
                new THREE.Vector2(3.5,  0.48),
                new THREE.Vector2(4.5,  0.46),
                new THREE.Vector2(5.5,  0.42),
                new THREE.Vector2(6.2,  0.35),
                new THREE.Vector2(6.8,  0.25),
                new THREE.Vector2(7.0,  0.18),
                new THREE.Vector2(7.1,  0.10),
            ];
            const fuselageGeo = new THREE.LatheGeometry(profilePts, 24);
            const fuselage = new THREE.Mesh(fuselageGeo, fuselageMat);
            fuselage.rotation.z = -Math.PI / 2;
            fuselage.position.x = -3.55;
            group.add(fuselage);

            // ── Stripe livery ─────────────────────────────────────────
            [0.5, -1.0].forEach(xOff => {
                const ring = new THREE.Mesh(new THREE.TorusGeometry(0.481, 0.025, 6, 24), accentMat);
                ring.rotation.y = Math.PI / 2;
                ring.position.x = xOff;
                group.add(ring);
            });

            // ── Radome (hidung gelap) ─────────────────────────────────
            const radomeGeo = new THREE.SphereGeometry(0.18, 16, 12, 0, Math.PI * 2, 0, Math.PI * 0.6);
            const radome = new THREE.Mesh(radomeGeo, noseMat);
            radome.rotation.z = -Math.PI / 2;
            radome.position.set(3.55, 0, 0);
            group.add(radome);

            // ── Kaca kokpit ───────────────────────────────────────────
            const cockpitGeo = new THREE.SphereGeometry(0.22, 12, 8, -0.4, 0.8, 0.05, 0.5);
            const cockpit = new THREE.Mesh(cockpitGeo, glassMat);
            cockpit.position.set(3.0, 0.38, 0);
            group.add(cockpit);

            // ── Jendela samping ───────────────────────────────────────
            for (let i = 0; i < 8; i++) {
                const winGeo = new THREE.PlaneGeometry(0.18, 0.12);
                const xPos = 2.4 - i * 0.55;
                [-1, 1].forEach(side => {
                    const win = new THREE.Mesh(winGeo, glassMat);
                    win.position.set(xPos, 0.44, side * 0.481);
                    win.rotation.y = side * Math.PI / 2;
                    group.add(win);
                });
            }

            // ── Sayap utama (swept, tapered, extruded) ────────────────
            function makeWing(side) {
                const s = side;
                const shape = new THREE.Shape();
                shape.moveTo( 0.8,  0.0 * s);
                shape.lineTo( 1.3,  1.0 * s);
                shape.lineTo( 0.8,  2.2 * s);
                shape.lineTo(-0.2,  3.0 * s);
                shape.lineTo(-1.1,  3.0 * s);
                shape.lineTo(-0.5,  2.2 * s);
                shape.lineTo( 0.0,  1.0 * s);
                shape.lineTo(-0.3,  0.0 * s);
                shape.closePath();
                const geo = new THREE.ExtrudeGeometry(shape, { depth: 0.055, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.015, bevelSegments: 2 });
                const mesh = new THREE.Mesh(geo, wingMat);
                mesh.rotation.x = -Math.PI / 2;
                mesh.position.set(-0.3, -0.38, 0);
                return mesh;
            }
            group.add(makeWing( 1));
            group.add(makeWing(-1));

            // ── Winglet ───────────────────────────────────────────────
            [-1, 1].forEach(side => {
                const wl = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.55, 0.38), wingMat);
                wl.position.set(-1.1, -0.12, side * 3.02);
                wl.rotation.x = side * 0.12;
                wl.rotation.z = 0.08;
                group.add(wl);
            });

            // ── Ekor horizontal ───────────────────────────────────────
            function makeHTail(side) {
                const s = side;
                const shape = new THREE.Shape();
                shape.moveTo( 0.3,  0.0 * s);
                shape.lineTo( 0.5,  0.6 * s);
                shape.lineTo( 0.1,  1.2 * s);
                shape.lineTo(-0.5,  1.2 * s);
                shape.lineTo(-0.2,  0.6 * s);
                shape.lineTo(-0.1,  0.0 * s);
                shape.closePath();
                const geo = new THREE.ExtrudeGeometry(shape, { depth: 0.04, bevelEnabled: false });
                const mesh = new THREE.Mesh(geo, wingMat);
                mesh.rotation.x = -Math.PI / 2;
                mesh.position.set(-3.2, 0.22, 0);
                return mesh;
            }
            group.add(makeHTail( 1));
            group.add(makeHTail(-1));

            // ── Sirip ekor vertikal ───────────────────────────────────
            const vShape = new THREE.Shape();
            vShape.moveTo( 0.0, 0.0);
            vShape.lineTo( 0.6, 0.6);
            vShape.lineTo( 0.3, 1.3);
            vShape.lineTo(-0.3, 1.3);
            vShape.lineTo(-0.6, 0.6);
            vShape.closePath();
            const vTailGeo = new THREE.ExtrudeGeometry(vShape, { depth: 0.05, bevelEnabled: false });
            const vTail = new THREE.Mesh(vTailGeo, wingMat);
            vTail.rotation.y = Math.PI / 2;
            vTail.position.set(-3.4, 0.45, 0.025);
            group.add(vTail);

            // ── Mesin turbofan ────────────────────────────────────────
            function makeEngine(zPos) {
                const eng = new THREE.Group();

                const nacelle = new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.20, 1.1, 18), engineMat);
                nacelle.rotation.z = Math.PI / 2;
                eng.add(nacelle);

                const inlet = new THREE.Mesh(new THREE.TorusGeometry(0.24, 0.025, 10, 24), engineRimMat);
                inlet.rotation.y = Math.PI / 2;
                inlet.position.x = 0.56;
                eng.add(inlet);

                const fan = new THREE.Mesh(new THREE.CircleGeometry(0.20, 18),
                    new THREE.MeshStandardMaterial({ color: 0x334466, metalness: 0.8, roughness: 0.2 }));
                fan.rotation.y = Math.PI / 2;
                fan.position.x = 0.55;
                eng.add(fan);

                const nozzle = new THREE.Mesh(new THREE.CylinderGeometry(0.17, 0.14, 0.3, 14), engineRimMat);
                nozzle.rotation.z = Math.PI / 2;
                nozzle.position.x = -0.7;
                eng.add(nozzle);

                const pylon = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.12, 0.08), fuselageMat);
                pylon.position.set(0, 0.22, 0);
                eng.add(pylon);

                eng.position.set(0.3, -0.55, zPos);
                eng.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
                return eng;
            }
            group.add(makeEngine( 1.5));
            group.add(makeEngine(-1.5));

            // ── Landing gear ──────────────────────────────────────────
            function makeGear(x, z, count) {
                const g = new THREE.Group();
                g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.4, 8), gearMat));
                for (let i = 0; i < count; i++) {
                    const tire = new THREE.Mesh(new THREE.TorusGeometry(0.11, 0.055, 8, 16), tireMat);
                    tire.rotation.x = Math.PI / 2;
                    tire.position.set(0, -0.27, (i - (count - 1) / 2) * 0.18);
                    g.add(tire);
                }
                g.position.set(x, -0.68, z);
                return g;
            }
            group.add(makeGear( 2.5,  0.0, 1));
            group.add(makeGear(-0.8,  0.4, 2));
            group.add(makeGear(-0.8, -0.4, 2));

            // ── Posisi di scene ───────────────────────────────────────
            group.position.set(
                (Math.random() - 0.5) * 6,
                1.2,
                (Math.random() - 0.5) * 6
            );
            group.rotation.y = (Math.random() - 0.5) * Math.PI;

            group.traverse(child => {
                if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
            });

            scene.add(group);
            objects.push(group);
        }

        // 6. Responsive Window
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 7. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
