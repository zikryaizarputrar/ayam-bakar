<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Architecture Planner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(30, 30, 30, 0.85);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            max-width: 250px;
        }
        h3 { margin-top: 0; color: #4fa8ff; }
        button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #4fa8ff;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #2f89e0; }
        .instruction {
            font-size: 12px;
            color: #aaa;
            margin-top: 15px;
            line-height: 1.4;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-panel">
        <h3>Architect 3D v1.0</h3>
        <p>Tambah Elemen:</p>
        <button onclick="addWall()">+ Tambah Dinding</button>
        <button onclick="addRoom()">+ Tambah Ruangan Kubus</button>
        <button onclick="addPlane()">🛩 Tambah Jet Tempur</button>
        <button onclick="clearScene()" style="background: #ff4f4f;">Hapus Semua</button>

        <div class="instruction">
            <strong>Navigasi:</strong><br>
            • Klik kiri + Geser: Putar Kamera<br>
            • Klik kanan + Geser: Geser Kamera<br>
            • Scroll: Zoom In/Out
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // 1. Setup Scene, Kamera, dan Renderer
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e1e1e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 15, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // 2. Kontrol Kamera (OrbitControls)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.01;

        // 3. Pencahayaan (Lighting)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 4. Lantai Grid
        const gridHelper = new THREE.GridHelper(30, 30, 0x4fa8ff, 0x444444);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        const floorGeometry = new THREE.PlaneGeometry(30, 30);
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x2e2e2e, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Array untuk menyimpan objek arsitektur yang dibuat
        let objects = [];

        // 5. Fungsi untuk Menambah Objek
        function addWall() {
            const geometry = new THREE.BoxGeometry(5, 2.5, 0.2);
            const material = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.5 });
            const wall = new THREE.Mesh(geometry, material);
            wall.position.set((Math.random() - 0.5) * 5, 1.25, (Math.random() - 0.5) * 5);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
            objects.push(wall);
        }

        function addRoom() {
            const geometry = new THREE.BoxGeometry(4, 3, 4);
            const material = new THREE.MeshStandardMaterial({
                color: 0x4fa8ff,
                wireframe: true,
                linewidth: 2
            });
            const room = new THREE.Mesh(geometry, material);
            room.position.set((Math.random() - 0.5) * 5, 1.5, (Math.random() - 0.5) * 5);
            scene.add(room);
            objects.push(room);
        }

        function clearScene() {
            objects.forEach(obj => scene.remove(obj));
            objects = [];
        }

        // ============================================================
        // Model Jet Tempur Detail (F-16/F-22 style)
        // ============================================================
        function addPlane() {
            const group = new THREE.Group();

            // ── Material ──────────────────────────────────────────────
            const bodyMat       = new THREE.MeshStandardMaterial({ color: 0x8899aa, roughness: 0.35, metalness: 0.70 });
            const darkMat       = new THREE.MeshStandardMaterial({ color: 0x445566, roughness: 0.40, metalness: 0.60 });
            const intakeMat     = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.50, metalness: 0.50 });
            const nozzleMat     = new THREE.MeshStandardMaterial({ color: 0x223344, roughness: 0.30, metalness: 0.90 });
            const glassMat      = new THREE.MeshStandardMaterial({ color: 0x55aaff, roughness: 0.00, metalness: 0.10, transparent: true, opacity: 0.45 });
            const accentMat     = new THREE.MeshStandardMaterial({ color: 0xcc2222, roughness: 0.40, metalness: 0.30 });
            const tireMat       = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.90, metalness: 0.00 });
            const gearMat       = new THREE.MeshStandardMaterial({ color: 0xbbbbbb, roughness: 0.30, metalness: 0.90 });
            const missileMat    = new THREE.MeshStandardMaterial({ color: 0x667788, roughness: 0.40, metalness: 0.60 });
            const missileTipMat = new THREE.MeshStandardMaterial({ color: 0xcc3300, roughness: 0.30, metalness: 0.20 });
            const afterburnMat  = new THREE.MeshStandardMaterial({ color: 0xff6600, roughness: 0.20, metalness: 0.10, emissive: 0xff3300, emissiveIntensity: 0.9, transparent: true, opacity: 0.85 });
            const innerGlowMat  = new THREE.MeshStandardMaterial({ color: 0xffee00, roughness: 0.10, metalness: 0.00, emissive: 0xffaa00, emissiveIntensity: 1.3, transparent: true, opacity: 0.70 });

            function sh(m) { m.castShadow = true; m.receiveShadow = true; return m; }

            // ── 1. Fuselage ramping (LatheGeometry) ───────────────────
            const fPts = [
                new THREE.Vector2(0,    0.008),
                new THREE.Vector2(0.2,  0.09),
                new THREE.Vector2(0.55, 0.19),
                new THREE.Vector2(1.1,  0.25),
                new THREE.Vector2(2.0,  0.27),
                new THREE.Vector2(3.0,  0.265),
                new THREE.Vector2(4.2,  0.26),
                new THREE.Vector2(5.0,  0.265),
                new THREE.Vector2(5.7,  0.28),
                new THREE.Vector2(6.3,  0.30),
                new THREE.Vector2(6.6,  0.28),
                new THREE.Vector2(6.85, 0.21),
                new THREE.Vector2(7.0,  0.13),
            ];
            const fuselage = sh(new THREE.Mesh(new THREE.LatheGeometry(fPts, 22), bodyMat));
            fuselage.rotation.z = -Math.PI / 2;
            fuselage.position.x = -3.5;
            group.add(fuselage);

            // ── 2. Pitot tube ─────────────────────────────────────────
            const pitot = sh(new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.025, 0.6, 8), darkMat));
            pitot.rotation.z = Math.PI / 2;
            pitot.position.set(3.8, 0.03, 0);
            group.add(pitot);

            // ── 3. Canopy ─────────────────────────────────────────────
            const cFrame = sh(new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.19, 0.68, 14), darkMat));
            cFrame.rotation.z = Math.PI / 2;
            cFrame.position.set(2.3, 0.25, 0);
            group.add(cFrame);

            const cGlass = sh(new THREE.Mesh(new THREE.SphereGeometry(0.20, 14, 10, 0, Math.PI * 2, 0, Math.PI * 0.52), glassMat));
            cGlass.rotation.z = -Math.PI / 2;
            cGlass.position.set(2.3, 0.23, 0);
            group.add(cGlass);

            const hud = sh(new THREE.Mesh(new THREE.PlaneGeometry(0.14, 0.09),
                new THREE.MeshStandardMaterial({ color: 0x88ffcc, transparent: true, opacity: 0.35 })));
            hud.rotation.set(0.4, Math.PI / 2, 0);
            hud.position.set(2.6, 0.30, 0);
            group.add(hud);

            // ── 4. LERX Strake ────────────────────────────────────────
            [-1, 1].forEach(s => {
                const ss = new THREE.Shape();
                ss.moveTo( 2.3,  0.0);
                ss.lineTo( 0.6,  s * 0.65);
                ss.lineTo( 0.1,  s * 0.85);
                ss.lineTo(-0.2,  s * 0.70);
                ss.lineTo( 0.5,  0.0);
                ss.closePath();
                const strake = sh(new THREE.Mesh(
                    new THREE.ExtrudeGeometry(ss, { depth: 0.022, bevelEnabled: false }), bodyMat));
                strake.rotation.x = -Math.PI / 2;
                strake.position.set(-0.3, -0.23, 0);
                group.add(strake);
            });

            // ── 5. Delta swept wing ───────────────────────────────────
            [-1, 1].forEach(s => {
                const ws = new THREE.Shape();
                ws.moveTo( 0.6,  0.0);
                ws.lineTo( 1.1,  s * 0.55);
                ws.lineTo( 0.7,  s * 1.45);
                ws.lineTo(-0.15, s * 2.55);
                ws.lineTo(-0.95, s * 2.55);
                ws.lineTo(-0.75, s * 1.70);
                ws.lineTo(-0.45, s * 0.90);
                ws.lineTo(-0.15, s * 0.35);
                ws.lineTo(-0.05, 0.0);
                ws.closePath();
                const wing = sh(new THREE.Mesh(
                    new THREE.ExtrudeGeometry(ws, { depth: 0.042, bevelEnabled: true, bevelThickness: 0.012, bevelSize: 0.010, bevelSegments: 2 }), bodyMat));
                wing.rotation.x = -Math.PI / 2;
                wing.position.set(-0.2, -0.25, 0);
                group.add(wing);

                const as = new THREE.Shape();
                as.moveTo(-0.18, s * 1.5);
                as.lineTo(-0.85, s * 2.5);
                as.lineTo(-0.95, s * 2.5);
                as.lineTo(-0.32, s * 1.5);
                as.closePath();
                const aileron = sh(new THREE.Mesh(
                    new THREE.ExtrudeGeometry(as, { depth: 0.046, bevelEnabled: false }), darkMat));
                aileron.rotation.x = -Math.PI / 2;
                aileron.position.set(-0.2, -0.248, 0);
                group.add(aileron);
            });

            // ── 6. Horizontal stabilizer ──────────────────────────────
            [-1, 1].forEach(s => {
                const hs = new THREE.Shape();
                hs.moveTo( 0.22, 0.0);
                hs.lineTo( 0.42, s * 0.38);
                hs.lineTo( 0.08, s * 1.05);
                hs.lineTo(-0.52, s * 1.05);
                hs.lineTo(-0.28, s * 0.38);
                hs.lineTo(-0.12, 0.0);
                hs.closePath();
                const stab = sh(new THREE.Mesh(
                    new THREE.ExtrudeGeometry(hs, { depth: 0.032, bevelEnabled: false }), bodyMat));
                stab.rotation.x = -Math.PI / 2;
                stab.position.set(-3.05, -0.02, 0);
                group.add(stab);
            });

            // ── 7. Twin canted vertical tails ─────────────────────────
            [-1, 1].forEach(s => {
                const vs = new THREE.Shape();
                vs.moveTo( 0.0, 0.0);
                vs.lineTo( 0.48, 0.45);
                vs.lineTo( 0.28, 1.18);
                vs.lineTo(-0.12, 1.18);
                vs.lineTo(-0.38, 0.45);
                vs.closePath();
                const vt = sh(new THREE.Mesh(
                    new THREE.ExtrudeGeometry(vs, { depth: 0.042, bevelEnabled: false }), bodyMat));
                vt.rotation.y = Math.PI / 2;
                vt.rotation.z = s * 0.20;
                vt.position.set(-3.15, 0.18, s * 0.20);
                group.add(vt);

                const rs = new THREE.Shape();
                rs.moveTo(-0.02, 0.28);
                rs.lineTo( 0.22, 0.45);
                rs.lineTo( 0.28, 1.18);
                rs.lineTo(-0.12, 1.18);
                rs.closePath();
                const rud = sh(new THREE.Mesh(
                    new THREE.ExtrudeGeometry(rs, { depth: 0.045, bevelEnabled: false }), darkMat));
                rud.rotation.y = Math.PI / 2;
                rud.rotation.z = s * 0.20;
                rud.position.set(-3.145, 0.18, s * 0.20);
                group.add(rud);
            });

            // ── 8. Chin intake (DSI) ──────────────────────────────────
            const is = new THREE.Shape();
            is.moveTo( 0.65,  0.0);
            is.lineTo( 0.65,  0.42);
            is.lineTo(-0.28,  0.52);
            is.lineTo(-0.38,  0.0);
            is.closePath();
            const intake = sh(new THREE.Mesh(
                new THREE.ExtrudeGeometry(is, { depth: 0.36, bevelEnabled: true, bevelThickness: 0.018, bevelSize: 0.018, bevelSegments: 3 }), intakeMat));
            intake.rotation.x = Math.PI / 2;
            intake.position.set(1.65, -0.24, -0.18);
            group.add(intake);

            const lip = sh(new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.020, 8, 18, Math.PI), bodyMat));
            lip.rotation.z = Math.PI / 2;
            lip.position.set(2.32, -0.26, 0);
            group.add(lip);

            const splitter = sh(new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.008, 0.34), darkMat));
            splitter.position.set(1.92, -0.18, 0);
            group.add(splitter);

            // ── 9. Ventral spine ─────────────────────────────────────
            const spine = sh(new THREE.Mesh(new THREE.BoxGeometry(3.8, 0.08, 0.18), darkMat));
            spine.position.set(-0.5, -0.30, 0);
            group.add(spine);

            // ── 10. Engine + afterburner ──────────────────────────────
            const pipe = sh(new THREE.Mesh(new THREE.CylinderGeometry(0.27, 0.27, 2.0, 18), intakeMat));
            pipe.rotation.z = Math.PI / 2;
            pipe.position.set(-2.2, 0, 0);
            group.add(pipe);

            for (let i = 0; i < 10; i++) {
                const angle = (i / 10) * Math.PI * 2;
                const petal = sh(new THREE.Mesh(new THREE.BoxGeometry(0.30, 0.048, 0.12), nozzleMat));
                petal.position.set(-3.28, Math.sin(angle) * 0.25, Math.cos(angle) * 0.25);
                petal.rotation.x = angle;
                group.add(petal);
            }

            const abFlame = sh(new THREE.Mesh(new THREE.ConeGeometry(0.21, 0.80, 14), afterburnMat));
            abFlame.rotation.z = -Math.PI / 2;
            abFlame.position.set(-3.82, 0, 0);
            group.add(abFlame);

            const abInner = sh(new THREE.Mesh(new THREE.ConeGeometry(0.10, 0.55, 12), innerGlowMat));
            abInner.rotation.z = -Math.PI / 2;
            abInner.position.set(-3.76, 0, 0);
            group.add(abInner);

            // ── 11. Wingtip missiles ──────────────────────────────────
            [-1, 1].forEach(s => {
                const mg = new THREE.Group();
                mg.add(sh(new THREE.Mesh(new THREE.CylinderGeometry(0.042, 0.042, 1.05, 10), missileMat)));
                const tip = sh(new THREE.Mesh(new THREE.ConeGeometry(0.042, 0.24, 10), missileTipMat));
                tip.rotation.z = -Math.PI / 2; tip.position.x = 0.645;
                mg.add(tip);
                const seekRing = sh(new THREE.Mesh(new THREE.TorusGeometry(0.042, 0.008, 6, 14), darkMat));
                seekRing.rotation.y = Math.PI / 2; seekRing.position.x = 0.48;
                mg.add(seekRing);
                for (let f = 0; f < 4; f++) {
                    const fa = (f / 4) * Math.PI * 2;
                    const fin = sh(new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.004, 0.08), missileMat));
                    fin.position.set(-0.38, Math.sin(fa) * 0.065, Math.cos(fa) * 0.065);
                    fin.rotation.x = fa;
                    mg.add(fin);
                }
                mg.rotation.z = Math.PI / 2;
                mg.position.set(-0.25, -0.26, s * 2.60);
                group.add(mg);
            });

            // ── 12. Drop tanks ────────────────────────────────────────
            [-1, 1].forEach(s => {
                const tg = new THREE.Group();
                tg.add(sh(new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.055, 1.15, 10), darkMat)));
                [-0.58, 0.58].forEach(xo => {
                    const cap = sh(new THREE.Mesh(new THREE.SphereGeometry(0.055, 8, 6, 0, Math.PI * 2, 0, Math.PI / 2), darkMat));
                    cap.rotation.z = xo > 0 ? -Math.PI / 2 : Math.PI / 2;
                    cap.position.x = xo;
                    tg.add(cap);
                });
                const tf = sh(new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.004, 0.07), darkMat));
                tf.position.set(-0.4, 0.065, 0);
                tg.add(tf);
                tg.rotation.z = Math.PI / 2;
                tg.position.set(0.2, -0.40, s * 1.25);
                group.add(tg);
            });

            // ── 13. Gun barrel ────────────────────────────────────────
            const gun = sh(new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 0.65, 8), nozzleMat));
            gun.rotation.z = Math.PI / 2;
            gun.position.set(1.5, -0.14, 0.28);
            group.add(gun);
            const gunMuzzle = sh(new THREE.Mesh(new THREE.TorusGeometry(0.018, 0.006, 6, 12), nozzleMat));
            gunMuzzle.rotation.y = Math.PI / 2;
            gunMuzzle.position.set(1.83, -0.14, 0.28);
            group.add(gunMuzzle);

            // ── 14. Panel lines ───────────────────────────────────────
            const abPanel = sh(new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.010, 0.32), darkMat));
            abPanel.position.set(-1.6, 0.278, 0);
            group.add(abPanel);
            const ngdoor = sh(new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.008, 0.18), darkMat));
            ngdoor.position.set(2.5, -0.27, 0);
            group.add(ngdoor);

            // ── 15. Sensor bumps ──────────────────────────────────────
            [1.9, 0.4, -0.9].forEach(xp => {
                const bump = sh(new THREE.Mesh(new THREE.SphereGeometry(0.035, 8, 6), darkMat));
                bump.position.set(xp, 0.288, 0);
                group.add(bump);
            });
            const aoa = sh(new THREE.Mesh(new THREE.CylinderGeometry(0.007, 0.011, 0.28, 6), darkMat));
            aoa.rotation.set(0, 0, Math.PI / 2 - 0.25);
            aoa.position.set(3.15, -0.18, 0.13);
            group.add(aoa);

            // ── 16. Roundel insignia ──────────────────────────────────
            [1, -1].forEach(s => {
                const r1 = sh(new THREE.Mesh(new THREE.CircleGeometry(0.12, 16), accentMat));
                r1.rotation.y = s * Math.PI / 2;
                r1.position.set(1.0, 0.01, s * 0.284);
                group.add(r1);
                const r2 = sh(new THREE.Mesh(new THREE.CircleGeometry(0.065, 16),
                    new THREE.MeshStandardMaterial({ color: 0xffffff })));
                r2.rotation.y = s * Math.PI / 2;
                r2.position.set(1.0, 0.01, s * 0.285);
                group.add(r2);
                const r3 = sh(new THREE.Mesh(new THREE.CircleGeometry(0.028, 16),
                    new THREE.MeshStandardMaterial({ color: 0x0033aa })));
                r3.rotation.y = s * Math.PI / 2;
                r3.position.set(1.0, 0.01, s * 0.286);
                group.add(r3);
            });

            // ── 17. Landing gear ──────────────────────────────────────
            function makeGear(x, z, tireR) {
                const g = new THREE.Group();
                g.add(sh(new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.022, 0.32, 8), gearMat)));
                const axle = sh(new THREE.Mesh(new THREE.CylinderGeometry(0.013, 0.013, 0.16, 6), gearMat));
                axle.rotation.z = Math.PI / 2; axle.position.y = -0.18;
                g.add(axle);
                const tire = sh(new THREE.Mesh(new THREE.TorusGeometry(tireR, tireR * 0.44, 8, 16), tireMat));
                tire.rotation.x = Math.PI / 2; tire.position.y = -0.19;
                g.add(tire);
                const brace = sh(new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, 0.20, 6), gearMat));
                brace.rotation.z = 0.35; brace.position.set(0.05, -0.06, 0);
                g.add(brace);
                g.position.set(x, -0.46, z);
                return g;
            }
            group.add(makeGear( 2.45,  0.00, 0.068));
            group.add(makeGear(-0.35,  0.48, 0.088));
            group.add(makeGear(-0.35, -0.48, 0.088));

            // ── Posisi di scene ───────────────────────────────────────
            group.position.set(
                (Math.random() - 0.5) * 8,
                1.0,
                (Math.random() - 0.5) * 8
            );
            group.rotation.y = (Math.random() - 0.5) * Math.PI;

            group.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });

            scene.add(group);
            objects.push(group);
        }

        // 6. Responsive Window
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 7. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
