<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Architecture Planner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(30, 30, 30, 0.85);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            max-width: 250px;
        }
        h3 { margin-top: 0; color: #4fa8ff; }
        button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #4fa8ff;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #2f89e0; }
        .instruction {
            font-size: 12px;
            color: #aaa;
            margin-top: 15px;
            line-height: 1.4;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-panel">
        <h3>Architect 3D v1.0</h3>
        <p>Tambah Elemen:</p>
        <button onclick="addWall()">+ Tambah Dinding</button>
        <button onclick="addRoom()">+ Tambah Ruangan Kubus</button>
        <button onclick="addPlane()">✈ Tambah Pesawat</button>
        <button onclick="clearScene()" style="background: #ff4f4f;">Hapus Semua</button>

        <div class="instruction">
            <strong>Navigasi:</strong><br>
            • Klik kiri + Geser: Putar Kamera<br>
            • Klik kanan + Geser: Geser Kamera<br>
            • Scroll: Zoom In/Out
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // 1. Setup Scene, Kamera, dan Renderer
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e1e1e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 15, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // 2. Kontrol Kamera (OrbitControls)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.01;

        // 3. Pencahayaan (Lighting)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 4. Lantai Grid
        const gridHelper = new THREE.GridHelper(30, 30, 0x4fa8ff, 0x444444);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        const floorGeometry = new THREE.PlaneGeometry(30, 30);
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x2e2e2e, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Array untuk menyimpan objek arsitektur yang dibuat
        let objects = [];

        // 5. Fungsi untuk Menambah Objek
        function addWall() {
            const geometry = new THREE.BoxGeometry(5, 2.5, 0.2);
            const material = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.5 });
            const wall = new THREE.Mesh(geometry, material);
            wall.position.set((Math.random() - 0.5) * 5, 1.25, (Math.random() - 0.5) * 5);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
            objects.push(wall);
        }

        function addRoom() {
            const geometry = new THREE.BoxGeometry(4, 3, 4);
            const material = new THREE.MeshStandardMaterial({
                color: 0x4fa8ff,
                wireframe: true,
                linewidth: 2
            });
            const room = new THREE.Mesh(geometry, material);
            room.position.set((Math.random() - 0.5) * 5, 1.5, (Math.random() - 0.5) * 5);
            scene.add(room);
            objects.push(room);
        }

        function clearScene() {
            objects.forEach(obj => scene.remove(obj));
            objects = [];
        }

        // Fungsi membuat model pesawat dari geometri Three.js
        function addPlane() {
            const group = new THREE.Group();

            // Warna utama pesawat
            const bodyMat  = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.4, metalness: 0.3 });
            const wingMat  = new THREE.MeshStandardMaterial({ color: 0xaaaacc, roughness: 0.4, metalness: 0.3 });
            const engineMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.5, metalness: 0.5 });
            const glassMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, roughness: 0.1, metalness: 0.1, transparent: true, opacity: 0.7 });

            // --- Badan utama (fuselage) ---
            const bodyGeo = new THREE.CylinderGeometry(0.35, 0.2, 4, 12);
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.rotation.z = Math.PI / 2; // baring horizontal
            group.add(body);

            // --- Hidung pesawat ---
            const noseGeo = new THREE.ConeGeometry(0.35, 1.2, 12);
            const nose = new THREE.Mesh(noseGeo, bodyMat);
            nose.rotation.z = -Math.PI / 2;
            nose.position.set(2.6, 0, 0);
            group.add(nose);

            // --- Kaca kokpit ---
            const cockpitGeo = new THREE.SphereGeometry(0.28, 10, 8, 0, Math.PI * 2, 0, Math.PI / 2);
            const cockpit = new THREE.Mesh(cockpitGeo, glassMat);
            cockpit.position.set(1.4, 0.28, 0);
            group.add(cockpit);

            // --- Sayap utama (kiri & kanan) ---
            const mainWingGeo = new THREE.BoxGeometry(1.8, 0.08, 4.5);
            const mainWing = new THREE.Mesh(mainWingGeo, wingMat);
            mainWing.position.set(-0.2, -0.05, 0);
            group.add(mainWing);

            // Ujung sayap sedikit miring (winglet kiri)
            const wingletGeo = new THREE.BoxGeometry(0.5, 0.4, 0.08);
            const wingletL = new THREE.Mesh(wingletGeo, wingMat);
            wingletL.position.set(-0.2, 0.15, 2.25);
            wingletL.rotation.x = 0.15;
            group.add(wingletL);

            // Winglet kanan
            const wingletR = wingletL.clone();
            wingletR.position.set(-0.2, 0.15, -2.25);
            wingletR.rotation.x = -0.15;
            group.add(wingletR);

            // --- Ekor horizontal (stabilizer) ---
            const hTailGeo = new THREE.BoxGeometry(0.8, 0.07, 2.2);
            const hTail = new THREE.Mesh(hTailGeo, wingMat);
            hTail.position.set(-1.8, 0, 0);
            group.add(hTail);

            // --- Sirip ekor vertikal ---
            const vTailGeo = new THREE.BoxGeometry(0.9, 0.8, 0.07);
            const vTail = new THREE.Mesh(vTailGeo, wingMat);
            vTail.position.set(-1.6, 0.4, 0);
            vTail.rotation.z = -0.15;
            group.add(vTail);

            // --- Mesin kiri ---
            const engineGeo = new THREE.CylinderGeometry(0.18, 0.15, 0.9, 10);
            const engineL = new THREE.Mesh(engineGeo, engineMat);
            engineL.rotation.z = Math.PI / 2;
            engineL.position.set(0, -0.28, 1.3);
            group.add(engineL);

            // Intake mesin kiri
            const intakeGeo = new THREE.TorusGeometry(0.18, 0.03, 8, 16);
            const intakeL = new THREE.Mesh(intakeGeo, engineMat);
            intakeL.rotation.y = Math.PI / 2;
            intakeL.position.set(0.46, -0.28, 1.3);
            group.add(intakeL);

            // --- Mesin kanan ---
            const engineR = engineL.clone();
            engineR.position.set(0, -0.28, -1.3);
            group.add(engineR);

            const intakeR = intakeL.clone();
            intakeR.position.set(0.46, -0.28, -1.3);
            group.add(intakeR);

            // Posisi pesawat: sedikit acak di atas scene, menghadap sumbu X
            group.position.set(
                (Math.random() - 0.5) * 4,
                2.5 + Math.random() * 2,
                (Math.random() - 0.5) * 4
            );
            group.rotation.y = (Math.random() - 0.5) * Math.PI;

            // Aktifkan shadow untuk semua bagian
            group.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(group);
            objects.push(group);
        }

        // 6. Responsive Window
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 7. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
