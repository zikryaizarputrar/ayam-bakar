<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Architecture Planner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(30, 30, 30, 0.85);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            max-width: 250px;
        }
        h3 { margin-top: 0; color: #4fa8ff; }
        button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #4fa8ff;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #2f89e0; }
        .instruction {
            font-size: 12px;
            color: #aaa;
            margin-top: 15px;
            line-height: 1.4;
        }
        /* Label status drag */
        #drag-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 170, 0, 0.85);
            color: #111;
            font-weight: bold;
            font-size: 13px;
            padding: 8px 18px;
            border-radius: 20px;
            pointer-events: none;
            display: none;
            transition: opacity 0.2s;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-panel">
        <h3>Architect 3D v1.0</h3>
        <p>Tambah Elemen:</p>
        <button onclick="addWall()">+ Tambah Dinding</button>
        <button onclick="addRoom()">+ Tambah Ruangan Kubus</button>
        <button onclick="clearScene()" style="background: #ff4f4f;">Hapus Semua</button>
        
        <div class="instruction">
            <strong>Navigasi Kamera:</strong><br>
            • Klik kiri + Geser: Putar Kamera<br>
            • Klik kanan + Geser: Geser Kamera<br>
            • Scroll: Zoom In/Out<br><br>
            <strong>Memindahkan Objek:</strong><br>
            • Klik objek (kuning) lalu geser<br>
            • Snap otomatis ke grid 0.5 unit<br>
            • Lepas klik untuk menempatkan
        </div>
    </div>

    <!-- Indikator saat objek sedang di-drag -->
    <div id="drag-hint">✦ Sedang Memindahkan Objek...</div>

    <div id="canvas-container"></div>

    <script>
        // ============================================================
        // 1. Setup Scene, Kamera, dan Renderer
        // ============================================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e1e1e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 15, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // ============================================================
        // 2. Kontrol Kamera (OrbitControls)
        // ============================================================
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.01;

        // ============================================================
        // 3. Pencahayaan (Lighting)
        // ============================================================
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // ============================================================
        // 4. Lantai Grid
        // ============================================================
        const gridHelper = new THREE.GridHelper(30, 30, 0x4fa8ff, 0x444444);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        const floorGeometry = new THREE.PlaneGeometry(30, 30);
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x2e2e2e, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Array untuk menyimpan objek arsitektur
        let objects = [];

        // ============================================================
        // 5. Fungsi Menambah Objek
        // ============================================================
        function addWall() {
            const geometry = new THREE.BoxGeometry(5, 2.5, 0.2);
            const material = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.5 });
            const wall = new THREE.Mesh(geometry, material);
            wall.userData.type = 'wall';
            wall.userData.originalColor = 0xdddddd;
            wall.position.set(
                Math.round((Math.random() - 0.5) * 10 / 0.5) * 0.5,
                1.25,
                Math.round((Math.random() - 0.5) * 10 / 0.5) * 0.5
            );
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
            objects.push(wall);
        }

        function addRoom() {
            const geometry = new THREE.BoxGeometry(4, 3, 4);
            const material = new THREE.MeshStandardMaterial({
                color: 0x4fa8ff,
                wireframe: true
            });
            const room = new THREE.Mesh(geometry, material);
            room.userData.type = 'room';
            room.userData.originalColor = 0x4fa8ff;
            room.position.set(
                Math.round((Math.random() - 0.5) * 10 / 0.5) * 0.5,
                1.5,
                Math.round((Math.random() - 0.5) * 10 / 0.5) * 0.5
            );
            scene.add(room);
            objects.push(room);
        }

        function clearScene() {
            objects.forEach(obj => scene.remove(obj));
            objects = [];
        }

        // ============================================================
        // 6. DragController — memindahkan objek di atas floor plane
        // ============================================================
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        // Floor plane invisible di y=0, digunakan untuk proyeksi ray
        const floorPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        const planeIntersectPoint = new THREE.Vector3();

        // State drag
        let dragTarget    = null;   // objek yang sedang di-drag
        let originalColor = null;   // warna asli sebelum highlight
        let dragOffset    = new THREE.Vector2(); // offset kursor ke posisi objek

        const dragHint = document.getElementById('drag-hint');

        /**
         * Hitung NDC (Normalized Device Coordinates) dari event mouse/touch.
         */
        function getNDC(clientX, clientY) {
            const rect = renderer.domElement.getBoundingClientRect();
            return new THREE.Vector2(
                ((clientX - rect.left) / rect.width)  *  2 - 1,
                ((clientY - rect.top)  / rect.height) * -2 + 1
            );
        }

        /**
         * Snap nilai ke kelipatan 0.5, lalu clamp ke [-14, 14].
         */
        function snapClamp(value) {
            return Math.max(-14, Math.min(14, Math.round(value / 0.5) * 0.5));
        }

        /**
         * Mulai drag: cek apakah ada objek di bawah kursor.
         */
        function onDragStart(clientX, clientY) {
            // Jika sudah ada drag aktif, abaikan
            if (dragTarget) return;

            pointer.copy(getNDC(clientX, clientY));
            raycaster.setFromCamera(pointer, camera);

            const hits = raycaster.intersectObjects(objects);
            if (hits.length === 0) return; // klik di ruang kosong → biarkan OrbitControls

            dragTarget = hits[0].object;
            originalColor = dragTarget.material.color.getHex();

            // Highlight kuning
            dragTarget.material.color.setHex(0xffaa00);

            // Hitung offset: posisi objek dikurangi titik intersect di floor plane
            raycaster.ray.intersectPlane(floorPlane, planeIntersectPoint);
            dragOffset.set(
                dragTarget.position.x - planeIntersectPoint.x,
                dragTarget.position.z - planeIntersectPoint.z
            );

            // Matikan kamera agar tidak berebut event
            controls.enabled = false;
            renderer.domElement.style.cursor = 'grabbing';
            dragHint.style.display = 'block';
        }

        /**
         * Saat drag bergerak: update posisi objek.
         */
        function onDragMove(clientX, clientY) {
            if (!dragTarget) return;

            pointer.copy(getNDC(clientX, clientY));
            raycaster.setFromCamera(pointer, camera);

            // Cek apakah ray berpotongan dengan floor plane
            if (!raycaster.ray.intersectPlane(floorPlane, planeIntersectPoint)) return;

            // Terapkan offset, snap, dan clamp
            dragTarget.position.x = snapClamp(planeIntersectPoint.x + dragOffset.x);
            dragTarget.position.z = snapClamp(planeIntersectPoint.z + dragOffset.y);
            // position.y TIDAK diubah agar objek tetap di atas lantai
        }

        /**
         * Akhiri drag: pulihkan warna dan aktifkan kembali kamera.
         */
        function onDragEnd() {
            if (!dragTarget) return;

            dragTarget.material.color.setHex(originalColor);
            dragTarget = null;
            originalColor = null;

            controls.enabled = true;
            renderer.domElement.style.cursor = 'default';
            dragHint.style.display = 'none';
        }

        // ── Mouse events ──────────────────────────────────────────────
        renderer.domElement.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return; // hanya tombol kiri
            onDragStart(e.clientX, e.clientY);
        });

        renderer.domElement.addEventListener('mousemove', (e) => {
            onDragMove(e.clientX, e.clientY);

            // Ubah kursor saat hover di atas objek (tanpa drag aktif)
            if (!dragTarget) {
                pointer.copy(getNDC(e.clientX, e.clientY));
                raycaster.setFromCamera(pointer, camera);
                const hits = raycaster.intersectObjects(objects);
                renderer.domElement.style.cursor = hits.length > 0 ? 'grab' : 'default';
            }
        });

        renderer.domElement.addEventListener('mouseup', (e) => {
            if (e.button !== 0) return;
            onDragEnd();
        });

        // Jika kursor keluar dari canvas saat drag, hentikan drag
        renderer.domElement.addEventListener('mouseleave', () => {
            onDragEnd();
        });

        // ── Touch events ──────────────────────────────────────────────
        renderer.domElement.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                onDragStart(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        renderer.domElement.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1) {
                onDragMove(e.touches[0].clientX, e.touches[0].clientY);
            } else if (e.touches.length >= 2 && dragTarget) {
                // Multi-touch: batalkan drag, izinkan pinch-zoom
                onDragEnd();
            }
        }, { passive: true });

        renderer.domElement.addEventListener('touchend', () => {
            onDragEnd();
        }, { passive: true });

        // ============================================================
        // 7. Responsive Window
        // ============================================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============================================================
        // 8. Animation Loop
        // ============================================================
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
