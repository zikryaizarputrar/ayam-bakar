<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Architecture Planner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(30, 30, 30, 0.85);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            max-width: 250px;
        }
        h3 { margin-top: 0; color: #4fa8ff; }
        button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #4fa8ff;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #2f89e0; }
        .instruction {
            font-size: 12px;
            color: #aaa;
            margin-top: 15px;
            line-height: 1.4;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-panel">
        <h3>Architect 3D v1.0</h3>
        <p>Tambah Elemen:</p>
        <button onclick="addWall()">+ Tambah Dinding</button>
        <button onclick="addRoom()">+ Tambah Ruangan Kubus</button>
        <button onclick="clearScene()" style="background: #ff4f4f;">Hapus Semua</button>

        <div class="instruction">
            <strong>Navigasi:</strong><br>
            • Klik kiri + Geser: Putar Kamera<br>
            • Klik kanan + Geser: Geser Kamera<br>
            • Scroll: Zoom In/Out
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // 1. Setup Scene, Kamera, dan Renderer
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e1e1e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 15, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // 2. Kontrol Kamera (OrbitControls)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.01;

        // 3. Pencahayaan (Lighting)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 4. Lantai Grid
        const gridHelper = new THREE.GridHelper(30, 30, 0x4fa8ff, 0x444444);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        const floorGeometry = new THREE.PlaneGeometry(30, 30);
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x2e2e2e, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Array untuk menyimpan objek arsitektur yang dibuat
        let objects = [];

        // 5. Fungsi untuk Menambah Objek
        function addWall() {
            const geometry = new THREE.BoxGeometry(5, 2.5, 0.2);
            const material = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.5 });
            const wall = new THREE.Mesh(geometry, material);
            wall.position.set((Math.random() - 0.5) * 5, 1.25, (Math.random() - 0.5) * 5);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
            objects.push(wall);
        }

        function addRoom() {
            const geometry = new THREE.BoxGeometry(4, 3, 4);
            const material = new THREE.MeshStandardMaterial({
                color: 0x4fa8ff,
                wireframe: true,
                linewidth: 2
            });
            const room = new THREE.Mesh(geometry, material);
            room.position.set((Math.random() - 0.5) * 5, 1.5, (Math.random() - 0.5) * 5);
            scene.add(room);
            objects.push(room);
        }

        function clearScene() {
            objects.forEach(obj => scene.remove(obj));
            objects = [];
        }

        // 6. Responsive Window
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 7. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
